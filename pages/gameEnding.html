<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kết thúc Mini Game</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/game.css">
</head>
<body>
  <div id="header-placeholder"></div>

  <main class="game-shell ending-page">
    <section id="ending-panel" class="ending-panel">
      <p class="eyebrow">Kết thúc</p>
      <h1 id="ending-title"></h1>
      <p id="ending-text"></p>
      <p id="ending-message" class="ending-message"></p>
      <section class="ending-score" aria-label="Chỉ số cuối cùng">
        <span id="ending-production">SL 0/10</span>
        <span id="ending-farmerLife">DS 0/10</span>
        <span id="ending-approval">DT 0/10</span>
        <span id="ending-risk">RR 0/10</span>
      </section>
      <div class="ending-actions">
        <a class="game-button primary" href="game.html">Chơi lại</a>
        <a class="game-button secondary" href="fromContractingtoContract10.html">Xem hành trình lịch sử</a>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="../js/app.js"></script>
  <script src="../js/gameEnding.js"></script>
</body>
</html>
